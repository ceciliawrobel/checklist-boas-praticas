<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Checklist Tablet - 75 Perguntas de Boas Práticas</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">

    <style>
        /* Variáveis de Cores para alternância de temas */
        :root {
            --bg-body: #f0f4f8;
            --bg-container: #ffffff;
            --text-main: #333333;
            --text-pergunta: #34495e;
            --border-bloco: #eef2f5;
            --bg-label: #f8f9fa;
            --border-label: #dcdde1;
            --bg-input: #ffffff;
        }

        [data-theme="dark"] {
            --bg-body: #121212;
            --bg-container: #1e1e1e;
            --text-main: #e0e0e0;
            --text-pergunta: #ffffff;
            --border-bloco: #2d2d2d;
            --bg-label: #2d2d2d;
            --border-label: #404040;
            --bg-input: #252525;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-body); 
            color: var(--text-main); 
            margin: 0; 
            padding: 10px; 
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        .container { 
            max-width: 900px; 
            margin: 0 auto; 
            background: var(--bg-container); 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
            position: relative;
            transition: background-color 0.3s ease;
            margin-top: 20px;
        }

        .theme-toggle {
            position: absolute;
            top: 15px;
            right: 15px;
            background-color: #2c3e50;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        [data-theme="dark"] .theme-toggle {
            background-color: #f1c40f;
            color: #121212;
        }

        h1 { color: #2c3e50; text-align: center; margin-bottom: 25px; font-size: 24px; padding-right: 40px; }
        [data-theme="dark"] h1 { color: #1abc9c; }
        
        /* Layout normal da tela */
        .perguntas-container { display: block; }
        .pergunta-bloco { padding: 20px 0; border-bottom: 2px solid var(--border-bloco); transition: background-color 0.3s; }
        .pergunta-texto { font-size: 15px; margin-bottom: 12px; font-weight: 600; color: var(--text-pergunta); line-height: 1.4; }
        
        .pergunta-alerta {
            background-color: rgba(231, 76, 60, 0.15) !important;
            border-left: 4px solid #e74c3c;
            padding-left: 10px;
            border-radius: 4px;
        }
        
        .opcoes { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
        
        label { 
            cursor: pointer; 
            background: var(--bg-label); 
            color: var(--text-main);
            padding: 14px 20px; 
            border: 1px solid var(--border-label); 
            border-radius: 8px; 
            font-size: 14px; 
            font-weight: bold; 
            transition: all 0.2s ease;
            flex: 1; 
            text-align: center;
            min-width: 70px;
        }
        
        input[type="radio"] { display: none; }
        
        input[value="SIM"]:checked + label { background-color: #2ecc71 !important; color: white !important; border-color: #2ecc71 !important; }
        input[value="PARCIAL"]:checked + label { background-color: #f1c40f !important; color: white !important; border-color: #f1c40f !important; }
        input[value="NAO"]:checked + label { background-color: #e74c3c !important; color: white !important; border-color: #e74c3c !important; }
        input[value="NO"]:checked + label { background-color: #95a5a6 !important; color: white !important; border-color: #95a5a6 !important; }
        
        /* Campo de Observação */
        .obs-container { width: 100%; }
        .obs-input {
            width: 100%;
            box-sizing: border-box;
            background-color: var(--bg-input);
            color: var(--text-main);
            border: 1px solid var(--border-label);
            border-radius: 6px;
            padding: 10px;
            font-family: inherit;
            font-size: 13px;
            resize: none;
            transition: border-color 0.2s;
        }
        .obs-input:focus {
            border-color: #1abc9c;
            outline: none;
        }
        
        .botoes-container { display: flex; gap: 15px; margin-top: 40px; }
        
        .btn-calcular { 
            flex: 1;
            background-color: #1abc9c; 
            color: white; 
            border: none; 
            padding: 20px; 
            font-size: 18px; 
            font-weight: bold; 
            border-radius: 8px; 
            cursor: pointer; 
            box-shadow: 0 4px 10px rgba(26, 188, 156, 0.3); 
        }
        
        .btn-pdf { 
            flex: 1;
            background-color: #34495e; 
            color: white; 
            border: none; 
            padding: 20px; 
            font-size: 18px; 
            font-weight: bold; 
            border-radius: 8px; 
            cursor: pointer; 
            box-shadow: 0 4px 10px rgba(52, 73, 94, 0.3); 
            display: none; 
        }
        
        #resultado { 
            margin-top: 35px; 
            padding: 25px; 
            border-radius: 8px; 
            display: none; 
            text-align: center; 
            font-size: 20px; 
            line-height: 1.6; 
            background-color: #e8f8f5; 
            color: #117a65; 
            border: 1px solid #a3e4d7; 
        }
        [data-theme="dark"] #resultado { background-color: #164e43; color: #a3e4d7; border: 1px solid #1abc9c; }
        
        .grid-resumo { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 15px; text-align: center; font-size: 16px; }
        
        @media (min-width: 600px) { .grid-resumo { grid-template-columns: 1fr 1fr; text-align: left; } }

        /* REGRAS DE IMPRESSÃO (CONFIGURAÇÃO DO PDF COMPACTO) */
        @media print {
            @page { margin: 1cm; }
            body { background-color: white !important; color: black !important; padding: 0; font-size: 11px; }
            .container { box-shadow: none !important; padding: 0 !important; max-width: 100% !important; margin: 0 !important; }
            .theme-toggle, .botoes-container { display: none !important; }
            h1 { color: black !important; font-size: 18px; margin-top: 0; margin-bottom: 15px; }
            
            .perguntas-container { 
                display: grid; 
                grid-template-columns: 1fr 1fr; 
                column-gap: 20px; 
                row-gap: 0;
            }
            
            .pergunta-bloco { 
                page-break-inside: avoid; 
                border-bottom: 1px solid #ddd !important; 
                padding: 8px 0 !important; 
                display: block; /* Mudado de flex para block para acomodar a obs abaixo */
                background-color: transparent !important;
            }
            
            .linha-topo-impressao {
                display: flex;
                justify-content: space-between;
                align-items: center;
                gap: 10px;
                width: 100%;
            }

            .pergunta-texto { color: black !important; font-size: 11px; margin-bottom: 0 !important; flex: 1; font-weight: normal; }
            
            input[type="radio"]:not(:checked) + label { display: none !important; }
            
            input[type="radio"]:checked + label { 
                display: inline-block !important; 
                width: auto !important;
                padding: 2px 8px !important; 
                border: 1px solid black !important; 
                background-color: #e6e6e6 !important; 
                color: black !important; 
                border-radius: 4px !important;
                font-size: 10px !important;
                font-weight: bold !important;
                text-align: center;
                min-width: 50px;
            }

            /* Estilização da Observação Impressa no PDF */
            .obs-container { margin-top: 4px; }
            .obs-input {
                border: none !important;
                padding: 0 !important;
                font-size: 10px !important;
                font-style: italic;
                color: #555 !important;
                background: transparent !important;
            }
            /* Esconde a caixa de texto se ela estiver totalmente vazia no PDF */
            .obs-input:placeholder-shown {
                display: none !important;
            }
            
            #resultado { 
                display: block !important; 
                background-color: #f9f9f9 !important; 
                color: black !important; 
                border: 1px solid black !important; 
                padding: 12px !important;
                margin-bottom: 20px; 
                font-size: 14px;
            }
            .grid-resumo { margin-top: 5px; font-size: 12px; }
        }
    </style>
</head>
<body>

<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('Aplicativo registrado com sucesso!', reg))
                .catch(err => console.log('Erro ao registrar aplicativo:', err));
        });
    }
</script>

<div class="container">
    <button type="button" class="theme-toggle" onclick="alternarTema()" id="btnTema">Modo Dark 🌙</button>

    <h1>Checklist de Boas Práticas</h1>

    <form id="checklistForm">
        
        <div class="perguntas-container">
            <script>
                const todasAsPerguntas = [
                    "1. As mãos dos manipuladores são lavadas com frequência?",
                    "2. A lavagem das mãos é realizada corretamente?",
                    "3. As mãos são higienizadas antes de manipular alimentos?",
                    "4. As unhas estão curtas, limpas e sem esmalte?",
                    "5. Os manipuladores estão sem adornos (anéis, pulseiras, relógios)?",
                    "6. Os manipuladores utilizam uniforme limpo e adequado?",
                    "7. Os cabelos estão totalmente protegidos?",
                    "8. Há troca regular de uniformes pelos manipuladores?",
                    "9. Os manipuladores evitam tocar o rosto durante o trabalho?",
                    "10. Os manipuladores evitam comportamentos inadequados na área de produção?",
                    "11. As superfícies de trabalho estão limpas e higienizadas?",
                    "12. O piso da área de produção está limpo e conservado?",
                    "13. As paredes estão limpas e sem danos aparentes?",
                    "14. O teto está limpo e sem acúmulo de sujeira?",
                    "15. O ambiente é higienizado com frequência adequada?",
                    "16. Não há acúmulo de lixo na área de produção?",
                    "17. O lixo é armazenado corretamente em recipientes fechados?",
                    "18. O ambiente está livre de pragas e insetos?",
                    "19. Há controle regular de pragas no local?",
                    "20. Não há presença de animais na área de manipulação?",
                    "21. Os ralos estão limpos e protegidos?",
                    "22. Há ventilação adequada no ambiente?",
                    "23. A iluminação é suficiente para as atividades?",
                    "24. O ambiente não apresenta odores desagradáveis?",
                    "25. Os produtos de limpeza são armazenados separadamente dos alimentos?",
                    "26. Não há alimentos vencidos armazenados?",
                    "27. Os alimentos estão dentro do prazo de validade?",
                    "28. As embalagens estão íntegras (sem vazamentos ou perfurações)?",
                    "29. Os alimentos estão corretamente identificados?",
                    "30. Os produtos estão organizados por tipo e categoria?",
                    "31. Existe separação entre alimentos crus e prontos?",
                    "32. Os alimentos estão armazenados em temperatura adequada?",
                    "33. Há controle de temperatura dos refrigeradores?",
                    "34. Os refrigeradores estão organizados?",
                    "35. Não há alimentos em contato direto com o chão?",
                    "36. As prateleiras estão limpas e organizadas?",
                    "37. Os alimentos são armazenados in recipientes adequados?",
                    "38. Há controle de entrada e saída de produtos?",
                    "39. Não há produtos com sinais de deterioração?",
                    "40. Os alimentos são protegidos de contaminação cruzada?",
                    "41. O espaço físico da cozinha é adequado às atividades?",
                    "42. O layout permite fluxo adequado de trabalho?",
                    "43. O local possui ventilação adequada?",
                    "44. A iluminação é suficiente?",
                    "45. O abastecimento de água é adequado?",
                    "46. A água utilizada é potável?",
                    "47. O sistema de esgoto funciona corretamente?",
                    "48. As instalações estão em bom estado de conservação?",
                    "49. Não há infiltrações nas paredes ou teto?",
                    "50. O piso é de material lavável e resistente?",
                    "51. As portas e janelas estão em boas condições?",
                    "52. Há barreiras contra entrada de insetos?",
                    "53. Os equipamentos estão limpos e em bom estado?",
                    "54. Os utensílios são higienizados após o uso?",
                    "55. A unidade possui balança em funcionamento?",
                    "56. Os refrigeradores estão funcionando corretamente?",
                    "57. Os fogões e fornos estão em boas condições?",
                    "58. Os equipamentos passam por manutenção periódica?",
                    "59. Há utensílios suficientes para a produção?",
                    "60. Os utensílios são exclusivos para alimentos crus e cozidos?",
                    "61. Os equipamentos são de fácil higienização?",
                    "62. Não há equipamentos quebrados em uso?",
                    "63. Existe pia exclusiva para lavagem das mãos?",
                    "64. Há sabonete líquido disponível na pia?",
                    "65. Há papel toalha disponível para secagem das mãos?",
                    "66. Os sanitários estão limpos e em bom estado?",
                    "67. Os funcionários têm armários adequados?",
                    "68. Existe local adequado para troca de uniforme?",
                    "69. Há lixeiras com tampa e acionamento adequado?",
                    "70. Os produtos de limpeza são armazenados separadamente?",
                    "71. A lavagem de hortifrutis é realizada corretamente?",
                    "72. O descongelamento dos alimentos segue procedimento adequado?",
                    "73. Existe controle de temperatura dos alimentos?",
                    "74. O Manual de Boas Práticas está disponível e acessível?",
                    "75. Os funcionários receberam treinamento em boas práticas?"
                ];

                todasAsPerguntas.forEach((texto, index) => {
                    const idQuestao = "q_" + index;
                    document.write(`
                        <div class="pergunta-bloco" id="bloco_${idQuestao}">
                            <div class="linha-topo-impressao">
                                <div class="pergunta-texto">${texto}</div>
                                <div class="opcoes">
                                    <input type="radio" id="${idQuestao}_s" name="${idQuestao}" value="SIM"><label for="${idQuestao}_s">SIM</label>
                                    <input type="radio" id="${idQuestao}_p" name="${idQuestao}" value="PARCIAL"><label for="${idQuestao}_p">PARCIAL</label>
                                    <input type="radio" id="${idQuestao}_n" name="${idQuestao}" value="NAO"><label for="${idQuestao}_n">NÃO</label>
                                    <input type="radio" id="${idQuestao}_no" name="${idQuestao}" value="NO"><label for="${idQuestao}_no">N.O.</label>
                                </div>
                            </div>
                            <div class="obs-container">
                                <textarea class="obs-input" rows="1" placeholder="Adicionar observação..." oninput="ajustarAltura(this)"></textarea>
                            </div>
                        </div>
                    `);
                });
            </script>
        </div>

        <div id="resultado"></div>

        <div class="botoes-container">
            <button type="button" class="btn-calcular" onclick="calcularNotaFinal()">Calcular Nota</button>
            <button type="button" class="btn-pdf" id="btnGerarPDF" onclick="gerarPDF()">Gerar Relatório em PDF 📄</button>
        </div>
    </form>
</div>

<script>
    const temaAtual = localStorage.getItem('tema') || 'light';
    if (temaAtual === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
        document.getElementById('btnTema').innerText = "Modo Claro ☀️";
    }

    function alternarTema() {
        const t = document.documentElement.getAttribute('data-theme');
        if (t === 'dark') {
            document.documentElement.removeAttribute('data-theme');
            localStorage.setItem('tema', 'light');
            document.getElementById('btnTema').innerText = "Modo Dark 🌙";
        } else {
            document.documentElement.setAttribute('data-theme', 'dark');
            localStorage.setItem('tema', 'dark');
            document.getElementById('btnTema').innerText = "Modo Claro ☀️";
        }
    }

    // Faz a caixa de observação crescer caso o texto ocupe mais linhas
    function ajustarAltura(element) {
        element.style.height = "auto";
        element.style.height = element.scrollHeight + "px";
    }

    function verificarRespostasFaltantes() {
        document.querySelectorAll('.pergunta-bloco').forEach(b => b.classList.remove('pergunta-alerta'));

        for (let i = 0; i < todasAsPerguntas.length; i++) {
            const idQuestao = "q_" + i;
            const radios = document.getElementsByName(idQuestao);
            let respondida = false;

            for (let r = 0; r < radios.length; r++) {
                if (radios[r].checked) {
                    respondida = true;
                    break;
                }
            }

            if (!respondida) {
                const blocoFaltante = document.getElementById("bloco_" + idQuestao);
                blocoFaltante.classList.add('pergunta-alerta');
                blocoFaltante.scrollIntoView({ behavior: 'smooth', block: 'center' });
                alert("Atenção! Você esqueceu de responder a pergunta número " + (i + 1) + ".");
                return false; 
            }
        }
        return true;
    }

    function calcularNotaFinal() {
        if (!verificarRespostasFaltantes()) {
            return; 
        }

        let pontosObtidos = 0;
        let pontosMaximosPossiveis = 0;
        const respostasMarcadas = document.querySelectorAll('input[type="radio"]:checked');

        respostasMarcadas.forEach(resposta => {
            const valor = resposta.value;
            if (valor !== 'NO') {
                pontosMaximosPossiveis += 1.0;
                if (valor === 'SIM') { pontosObtidos += 1.0; }
                else if (valor === 'PARCIAL') { pontosObtidos += 0.5; }
            }
        });

        const resultadoDiv = document.getElementById('resultado');
        if (pontosMaximosPossiveis > 0) {
            const percentual = ((pontosObtidos / pontosMaximosPossiveis) * 100).toFixed(2);
            let corHex = "#e74c3c";
            let classificacao = "Crítico! Intervenção Requerida.";
            
            if (percentual >= 90) { corHex = "#2ecc71"; classificacao = "🏆 Excelente Adequação!"; }
            else if (percentual >= 70) { corHex = "#27ae60"; classificacao = "👍 Boa Adequação."; }
            else if (percentual >= 50) { corHex = "#f39c12"; classificacao = "⚠️ Nível Regular."; }

            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            
            resultadoDiv.innerHTML = `
                <strong style="font-size: 18px; color: ${isDark ? '#ffffff' : '#2c3e50'};">RESUMO DE ADEQUAÇÃO</strong>
                <div class="grid-resumo">
                    <div><strong>Itens Conformes:</strong> ${pontosObtidos.toFixed(1)}</div>
                    <div><strong>Itens Válidos (Sem N.O.):</strong> ${pontosMaximosPossiveis}</div>
                </div>
                <div style="font-size: 38px; font-weight: bold; color: ${corHex}; margin: 10px 0;">${percentual}%</div>
                <span style="font-size: 16px; font-weight: bold; color: ${isDark ? '#e0e0e0' : '#34495e'};">${classificacao}</span>
            `;
            
            document.getElementById('btnGerarPDF').style.display = 'block';
        } else {
            resultadoDiv.innerHTML = "Nenhum item válido selecionado.";
        }
        resultadoDiv.style.display = 'block';
        resultadoDiv.scrollIntoView({ behavior: 'smooth' });
    }

    function gerarPDF() {
        window.print();
    }
</script>

</body>
</html>
